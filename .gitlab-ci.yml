# Docker image
image: node:latest

# Cached
cache:
  key: npm
  policy: pull-push
  paths:
    - .npm/


# Define the stages
stages:
  - build
  - deploy

build:
  stage: build
  script:
    - npm ci
    - tar czfv server.tgz ./
  artifacts:
    - server.tgz

deploy:
  image: python:latest
  stage: deploy
  script:
    - pip install awscli
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws s3 cp server.tgz s3://elasticbeanstalk-us-east-2-671402616253/TrainPreddict-B2C-$CI_PIPELINE_ID --recursive
    - aws elasticbeanstalk create-application-version --application-name TrainPreddict-B2C --version-label TrainPreddict-B2C-$CI_PIPELINE_ID --source-bundle S3Bucket=elasticbeanstalk-us-east-2-671402616253,S3Key=TrainPreddict-B2C-$CI_PIPELINE_ID --region us-east-2
    - aws elasticbeanstalk update-environment --application-name TrainPreddict-B2C --environment-name TrainPreddict-B2C-env --version-label TrainPreddict-B2C-$CI_PIPELINE_ID --region us-east-2
